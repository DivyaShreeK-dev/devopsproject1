<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Add User</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-role="admin" data-admin-view="add-user">
    <div class="page-shell">
      <aside class="sidebar">
        <h2>OAS Admin</h2>
        <p id="adminWelcomeText">Welcome</p>
        <button class="btn btn-secondary full-width" id="logoutBtn">Logout</button>
      </aside>
      <main class="main-content">
        <header class="page-header">
          <div>
            <p class="eyebrow">Admin</p>
            <h1>Add User</h1>
            <p class="page-copy">Create students, teachers, or admins directly from the control panel.</p>
          </div>
        </header>
        <section class="stats-grid" id="adminStatsGrid"></section>
        <section class="panel">
          <div class="panel-header"><h2>Add User</h2></div>
          <form id="adminUserForm" class="grid-form">
            <label>Full Name<input type="text" name="name" required /></label>
            <label>Email<input type="email" name="email" required /></label>
            <label>Password<input type="password" name="password" required /></label>
            <label>
              Role
              <select name="role" required>
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
                <option value="admin">Admin</option>
              </select>
            </label>
            <button class="btn btn-primary" type="submit">Add User</button>
          </form>
          <p id="adminMessage" class="message"></p>
        </section>
      </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
