<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Users</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-role="admin" data-admin-view="users">
    <div class="page-shell">
      <aside class="sidebar">
        <h2>OAS Admin</h2>
        <p id="adminWelcomeText">Welcome</p>
        <button class="btn btn-secondary full-width" id="logoutBtn">Logout</button>
      </aside>
      <main class="main-content">
        <header class="page-header">
          <div>
            <p class="eyebrow">Admin</p>
            <h1>Users Management</h1>
            <p class="page-copy">Search users, filter by role, update roles, and delete accounts.</p>
          </div>
        </header>
        <section class="stats-grid" id="adminStatsGrid"></section>
        <section class="panel">
          <div class="panel-header">
            <h2>Users</h2>
            <div class="toolbar">
              <input id="adminUserSearch" type="search" placeholder="Search users..." />
              <select id="adminRoleFilter">
                <option value="all">All Roles</option>
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <div id="adminUsers" class="teacher-assignment-list"></div>
          <p id="adminMessage" class="message"></p>
        </section>
      </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
