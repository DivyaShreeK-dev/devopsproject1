<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-role="admin">
    <div class="page-shell">
      <aside class="sidebar">
        <h2>OAS Admin</h2>
        <p id="adminWelcomeText">Welcome</p>
        <button class="btn btn-secondary full-width" id="logoutBtn">Logout</button>
      </aside>

      <main class="main-content">
        <header class="page-header">
          <div>
            <p class="eyebrow">Admin Dashboard</p>
            <h1>Manage platform activity and student alerts</h1>
            <p class="page-copy">Monitor users, review submission flow, and publish announcement alerts for students.</p>
          </div>
        </header>

        <section class="stats-grid" id="adminStatsGrid"></section>

        <section class="panel">
          <div class="panel-header">
            <h2>Create Student Alert</h2>
          </div>
          <form id="alertForm" class="grid-form">
            <label>
              Title
              <input type="text" name="title" required />
            </label>
            <label>
              Type
              <select name="type">
                <option value="announcement">Announcement</option>
                <option value="warning">Warning</option>
                <option value="deadline">Deadline</option>
              </select>
            </label>
            <label class="full-span">
              Message
              <textarea name="message" rows="4" required></textarea>
            </label>
            <label>
              Target
              <select name="targetRole">
                <option value="student">Students</option>
                <option value="teacher">Teachers</option>
                <option value="all">Everyone</option>
              </select>
            </label>
            <label>
              Expires At
              <input type="datetime-local" name="expiresAt" />
            </label>
            <button class="btn btn-primary" type="submit">Publish Alert</button>
          </form>
          <p id="adminMessage" class="message"></p>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Users</h2>
            <div class="toolbar">
              <input id="adminUserSearch" type="search" placeholder="Search users..." />
              <select id="adminRoleFilter">
                <option value="all">All Roles</option>
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <div id="adminUsers" class="teacher-assignment-list"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Recent Submission Activity</h2>
          </div>
          <div id="adminRecentSubmissions" class="teacher-assignment-list"></div>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
