<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-role="student">
    <div class="page-shell">
      <aside class="sidebar">
        <h2>OAS Student</h2>
        <p id="welcomeText">Welcome</p>
        <button class="btn btn-secondary full-width" id="logoutBtn">Logout</button>
      </aside>

      <main class="main-content">
        <header class="page-header">
          <div>
            <p class="eyebrow">Student Dashboard</p>
            <h1>Track your assignments and marks</h1>
            <p class="page-copy">See deadlines early, filter your work quickly, and keep an eye on your performance.</p>
          </div>
        </header>

        <section id="reminderBanner" class="reminder-banner hidden"></section>

        <section class="stats-grid" id="statsGrid"></section>

        <section class="panel">
          <div class="panel-header">
            <h2>Assignments</h2>
            <div class="toolbar">
              <input id="assignmentSearch" type="search" placeholder="Search assignments..." />
              <select id="assignmentFilter">
                <option value="all">All Status</option>
                <option value="pending">Pending</option>
                <option value="submitted">Submitted</option>
                <option value="graded">Graded</option>
              </select>
            </div>
          </div>
          <div id="assignmentsContainer" class="assignment-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Marks Overview</h2>
          </div>
          <div id="marksOverview" class="marks-list"></div>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
