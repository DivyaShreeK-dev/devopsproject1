<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAS System</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="auth-shell landing-shell">
      <section class="hero-card">
        <div class="hero-badge">OAS</div>
        <h1>Online Assignment Submission and Tracking System</h1>
        <div class="hero-icon-grid">
          <div class="hero-icon-card">
            <span class="hero-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3 4 7v10l8 4 8-4V7l-8-4Zm0 2.2 5.5 2.8L12 10.8 6.5 8 12 5.2Zm-6 4.4 5 2.6v6.2l-5-2.5V9.6Zm7 8.8v-6.2l5-2.6v6.3l-5 2.5Z"></path>
              </svg>
            </span>
            <p>Organized Work</p>
          </div>
          <div class="hero-icon-card">
            <span class="hero-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm1 5v4.6l3.2 1.9-1 1.7L11 12.7V7Z"></path>
              </svg>
            </span>
            <p>On-Time Tracking</p>
          </div>
          <div class="hero-icon-card">
            <span class="hero-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 4h16v12H7.4L4 19.4V4Zm2 2v8.6l.6-.6H18V6Zm3 2h6v2H9Zm0 4h4v2H9Z"></path>
              </svg>
            </span>
            <p>Quick Feedback</p>
          </div>
        </div>
      </section>

      <section class="auth-card">
        <div class="tabs">
          <button class="tab-btn active" data-tab="login">Login</button>
          <button class="tab-btn" data-tab="signup">Sign Up</button>
        </div>

        <form id="loginForm" class="form-panel active">
          <h2>Login</h2>
          <label>
            Email
            <input type="email" name="email" placeholder="Enter email" required />
          </label>
          <label>
            Password
            <input type="password" name="password" placeholder="Enter password" required />
          </label>
          <label>
            Role
            <select name="role" required>
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
            </select>
          </label>
          <button class="btn btn-primary full-width" type="submit">Login</button>
        </form>

        <form id="signupForm" class="form-panel">
          <h2>Create Account</h2>
          <label>
            Full Name
            <input type="text" name="name" placeholder="Enter full name" required />
          </label>
          <label>
            Email
            <input type="email" name="email" placeholder="Enter email" required />
          </label>
          <label>
            Password
            <input type="password" name="password" placeholder="Minimum 6 characters" required />
          </label>
          <label>
            Role
            <select name="role" required>
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
            </select>
          </label>
          <button class="btn btn-primary full-width" type="submit">Sign Up</button>
        </form>

        <p id="authMessage" class="message"></p>
      </section>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/auth.js"></script>
  </body>
</html>
