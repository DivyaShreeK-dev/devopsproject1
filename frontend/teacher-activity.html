<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Activity</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-role="teacher" data-teacher-view="activity">
    <div class="page-shell">
      <aside class="sidebar">
        <h2>OAS Teacher</h2>
        <p id="teacherWelcomeText">Welcome</p>
        <button class="btn btn-secondary full-width" id="logoutBtn">Logout</button>
      </aside>
      <main class="main-content">
        <header class="page-header">
          <div>
            <p class="eyebrow">Teacher</p>
            <h1>Activity Overview</h1>
            <p class="page-copy">See assignment totals, submission counts, grading progress, and recent updates.</p>
          </div>
        </header>
        <section class="stats-grid" id="teacherStatsGrid"></section>
        <section class="panel" id="recentActivitySection">
          <div class="panel-header"><h2>Recent Activity</h2></div>
          <div id="recentActivity" class="marks-list"></div>
        </section>
      </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/teacher.js"></script>
  </body>
</html>
