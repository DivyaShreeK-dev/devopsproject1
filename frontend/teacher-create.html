<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Assignment</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-role="teacher" data-teacher-view="create">
    <div class="page-shell">
      <aside class="sidebar">
        <h2>OAS Teacher</h2>
        <p id="teacherWelcomeText">Welcome</p>
        <button class="btn btn-secondary full-width" id="logoutBtn">Logout</button>
      </aside>
      <main class="main-content">
        <header class="page-header">
          <div>
            <p class="eyebrow">Teacher</p>
            <h1>Create Assignment</h1>
            <p class="page-copy">Add a new assignment with title, subject, description, and due date.</p>
          </div>
        </header>
        <section class="panel" id="createAssignmentSection">
          <div class="panel-header"><h2>Create Assignment</h2></div>
          <form id="assignmentForm" class="grid-form">
            <label>Title<input type="text" name="title" required /></label>
            <label>Subject<input type="text" name="subject" required /></label>
            <label class="full-span">Description<textarea name="description" rows="4" required></textarea></label>
            <label>Due Date<input type="datetime-local" name="dueDate" required /></label>
            <button class="btn btn-primary" type="submit">Create Assignment</button>
          </form>
          <p id="teacherMessage" class="message"></p>
        </section>
      </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/teacher.js"></script>
  </body>
</html>
