<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Submissions</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-role="teacher" data-teacher-view="review">
    <div class="page-shell">
      <aside class="sidebar">
        <h2>OAS Teacher</h2>
        <p id="teacherWelcomeText">Welcome</p>
        <button class="btn btn-secondary full-width" id="logoutBtn">Logout</button>
      </aside>
      <main class="main-content">
        <header class="page-header">
          <div>
            <p class="eyebrow">Teacher</p>
            <h1>Review Student Work</h1>
            <p class="page-copy">Search assignments, open student submissions, edit assignments, and assign grades.</p>
          </div>
        </header>
        <section class="panel" id="teacherAssignmentsSection">
          <div class="panel-header">
            <h2>Review Student Work</h2>
            <div class="toolbar">
              <input id="teacherAssignmentSearch" type="search" placeholder="Search assignments..." />
              <select id="teacherSubmissionFilter">
                <option value="all">All Submissions</option>
                <option value="pending">Pending</option>
                <option value="submitted">Submitted</option>
                <option value="graded">Graded</option>
              </select>
            </div>
          </div>
          <div id="teacherAssignments" class="teacher-assignment-list"></div>
          <p id="teacherActionMessage" class="message"></p>
        </section>
      </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/teacher.js"></script>
  </body>
</html>
