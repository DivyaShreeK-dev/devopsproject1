<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-role="teacher">
    <div class="page-shell">
      <aside class="sidebar">
        <h2>OAS Teacher</h2>
        <p id="teacherWelcomeText">Welcome</p>
        <button class="btn btn-secondary full-width" id="logoutBtn">Logout</button>
      </aside>

      <main class="main-content">
        <section class="dashboard-hero teacher-theme">
          <div class="dashboard-hero-top">
            <h1>Welcome <span id="teacherHeroName">Teacher</span></h1>
          </div>
          <div class="dashboard-hero-strip">
            <h2>Teacher Dashboard</h2>
          </div>
          <div class="quick-grid">
            <a class="quick-card" href="/teacher-create.html">
              <span class="quick-circle">Add Assignment</span>
            </a>
            <a class="quick-card" href="/teacher-add-subject.html">
              <span class="quick-circle">Add Subject</span>
            </a>
            <a class="quick-card" href="/teacher-review.html">
              <span class="quick-circle">Review Student Work</span>
            </a>
            <a class="quick-card" href="/teacher-submitted.html">
              <span class="quick-circle">Submitted Assignment</span>
            </a>
            <a class="quick-card" href="/teacher-report.html">
              <span class="quick-circle">Export CSV</span>
            </a>
            <a class="quick-card" href="/teacher-subject-report.html">
              <span class="quick-circle">Subject Report</span>
            </a>
            <a class="quick-card" href="/teacher-student-report.html">
              <span class="quick-circle">Student Report</span>
            </a>
            <a class="quick-card" href="/teacher-account.html">
              <span class="quick-circle">My Account</span>
            </a>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/teacherHome.js"></script>
  </body>
</html>
